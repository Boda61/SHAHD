<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="style.css" />

    <title>❤️</title>
  </head>

  <body>
    <!-- LOADING -->ء
    <div id="loading" class="center">
      <div class="glass">
        <div class="loader"></div>
        <p class="loading-text">ثواني يا روحي معلش 😂❤️</p>
      </div>
    </div>

    <!-- MAIN -->
    <div id="main" class="center">
      <div class="glass">
        <img src="hany 5.jpeg" />

        <p>جاهزة ❤️</p>

        <input type="password" id="pass" placeholder="اكتبي الباسورد" />
        <br />

        <button onclick="check()">يلا بسرعه افتحي ❤️</button>
      </div>
    </div>

    <script>
      setTimeout(() => {
        document.getElementById("loading").style.display = "none";
        document.getElementById("main").style.display = "flex";
      }, 3000);

      function check() {
        let p = document.getElementById("pass").value;

        if (p === "30/3/2003") {
          window.location.href = "Home.html";
        } else {
          alert("غلط 😅");
        }
      }
    </script>
  </body>
</html>
